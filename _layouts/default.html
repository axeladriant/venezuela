<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <style>
    :root {
      --bg: #ffffff;
      --fg: #24292e;
      --fg-muted: #586069;
      --link: #0366d6;
      --border: #e1e4e8;
      --code-bg: #f6f8fa;
      --blockquote-border: #dfe2e5;
      --blockquote-fg: #6a737d;
      --table-border: #dfe2e5;
      --table-alt: #f6f8fa;
      --col-width: 800px;
      --gap: 3rem;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0d1117;
        --fg: #c9d1d9;
        --fg-muted: #8b949e;
        --link: #58a6ff;
        --border: #30363d;
        --code-bg: #161b22;
        --blockquote-border: #3b434b;
        --blockquote-fg: #8b949e;
        --table-border: #30363d;
        --table-alt: #161b22;
      }
    }

    * { box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.6;
      color: var(--fg);
      background: var(--bg);
      max-width: var(--col-width);
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    @media (min-width: 1400px) {
      body {
        max-width: calc(var(--col-width) * 2 + var(--gap));
      }

      .content {
        columns: 2;
        column-gap: var(--gap);
        column-rule: 1px solid var(--border);
      }

      .content h1,
      .content h2 {
        column-span: all;
      }

      .content table {
        column-span: all;
      }

      .content blockquote:first-child {
        column-span: all;
      }

      .content hr {
        column-span: all;
      }
    }

    a { color: var(--link); text-decoration: none; }
    a:hover { text-decoration: underline; }

    h1, h2, h3, h4 { margin-top: 1.5em; margin-bottom: 0.5em; font-weight: 600; }
    h1 { font-size: 2em; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
    h2 { font-size: 1.5em; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
    h3 { font-size: 1.25em; }

    p { margin: 1em 0; }

    blockquote {
      border-left: 4px solid var(--blockquote-border);
      color: var(--blockquote-fg);
      margin: 1em 0;
      padding: 0.5em 1em;
    }

    code {
      background: var(--code-bg);
      padding: 0.2em 0.4em;
      border-radius: 3px;
      font-size: 0.9em;
    }

    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 2em 0;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      margin: 1em 0;
    }

    th, td {
      border: 1px solid var(--table-border);
      padding: 0.5em 0.75em;
      text-align: left;
    }

    tr:nth-child(even) { background: var(--table-alt); }
    th { font-weight: 600; }

    strong { font-weight: 600; }
    em { font-style: italic; }

    ul, ol { padding-left: 2em; }
    li { margin: 0.25em 0; }

    .site-header {
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 2px solid var(--border);
    }

    .site-header a {
      color: var(--fg);
      font-size: 1.1em;
      font-weight: 600;
    }

    .site-header a:hover { color: var(--link); text-decoration: none; }
  </style>
</head>
<body>
  <nav class="site-header">
    <a href="{{ '/' | relative_url }}">{{ site.title }}</a>
  </nav>
  <div class="content">
    {{ content }}
  </div>
</body>
</html>
